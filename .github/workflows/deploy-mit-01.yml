name: Deploy papAIa to mit-01

on:
  push:
    branches:
      - 'releases/**'
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Manual deploy target (dev|stage|demo|infra)'
        required: true
        type: choice
        options:
          - dev
          - stage
          - demo
          - infra

jobs:
  determine-target:
    runs-on: [self-hosted, mit-01, fidonis]
    outputs:
      env: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ github.event.inputs.target_env }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/releases/* ]]; then
            echo "env=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "env=stage" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "env=demo" >> "$GITHUB_OUTPUT"
          else
            echo "env=" >> "$GITHUB_OUTPUT"
            echo "::warning::No target env matched for ref $GITHUB_REF"
          fi

  deploy:
    needs: determine-target
    if: needs.determine-target.outputs.env != ''
    runs-on: [self-hosted, mit-01, fidonis]
    env:
      TARGET_ENV: ${{ needs.determine-target.outputs.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync src/ → /srv/fidonis/$TARGET_ENV/compose/
        run: |
          set -euo pipefail
          DEST="/srv/fidonis/${TARGET_ENV}/compose"
          if [[ ! -d "$DEST" ]]; then
            echo "::error::Compose-Verzeichnis nicht vorhanden: $DEST"
            exit 1
          fi
          # Wichtig: .env und secrets/ NICHT überschreiben — die liegen pro Env stabil auf dem Server
          rsync -av --delete \
            --exclude='.env' \
            --exclude='secrets/' \
            --exclude='secrets/*' \
            src/ "$DEST/"

      - name: Pull images
        run: sudo /usr/local/bin/fidonis-ctl "${TARGET_ENV}" pull

      - name: Up (recreate changed)
        run: sudo /usr/local/bin/fidonis-ctl "${TARGET_ENV}" up -d

      - name: Wait + Health-Check
        run: |
          set -euo pipefail
          sleep 15
          sudo /usr/local/bin/fidonis-ctl "${TARGET_ENV}" ps
          # Optional: spezifische Health-Endpoints prüfen
          # curl -fsS "http://192.168.10.10X:830X/healthz" || true

      - name: Deploy summary
        if: always()
        run: |
          echo "::notice::Deploy zu Env=$TARGET_ENV abgeschlossen (ref=$GITHUB_REF, sha=$GITHUB_SHA)"

# ═══════════════════════════════════════════════════════════════════════════
# papAIa - Unified Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════════════════
# The project name is taken from COMPOSE_PROJECT_NAME in .env so multiple
# environments (papaia-dev / papaia-stage / papaia-demo / ...) can run on
# the same host without volume- or container-name collisions.
# Do not re-introduce a top-level `name:` field here — it would override
# COMPOSE_PROJECT_NAME silently.

include:
  # Infrastructure Services
  - path: ./infra/keycloak/docker-compose.yml
  - path: ./infra/oauth2-proxy/docker-compose.yml
  - path: ./infra/nginx/docker-compose.yml
  # - path: ./infra/technitium/docker-compose.yml

  # Application Services
  - path: ./services/firecrawl/docker-compose.yml
  # - path: ./services/home-assistant/docker-compose.yml
  - path: ./services/homepage/docker-compose.yml
  - path: ./services/paperless/docker-compose.yml
  - path: ./services/searxng/docker-compose.yml

  # AI Services
  - path: ./ai/librechat/docker-compose.yml
  - path: ./ai/litellm/docker-compose.yml
  - path: ./ai/localai/docker-compose.yml
  - path: ./ai/mcp-paperless/docker-compose.yml
  - path: ./ai/n8n/docker-compose.yml
  - path: ./ai/qdrant-rag/docker-compose.yml
  - path: ./ai/qdrant-webdav-ingest/docker-compose.yml
  - path: ./ai/jinaai/docker-compose.yml

networks:
  papaia-net:
    driver: bridge
    name: ${DOCKER_NETWORK}

services:
  homeassistant:
    image: ${HOMEASSISTANT_IMAGE}
    restart: unless-stopped
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - homeassistant-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    privileged: true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8123 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      de.fidonis.module: papaia-homeassistant
      de.fidonis.role:   home-automation
    profiles: [home-assistant]

volumes:
  homeassistant-config:

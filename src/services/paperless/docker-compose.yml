# ═══════════════════════════════════════════════════════════════════════════
# papAIa — Paperless-ngx · Document Management
# by Fidonis GmbH · https://fidonis.de
# ═══════════════════════════════════════════════════════════════════════════
services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  WEBSERVER — Paperless-ngx application
  #
  #  Document ingestion, OCR, full-text indexing, and web UI.
  #  Native OIDC login via Keycloak (django-allauth openid_connect provider) —
  #  no oauth2-proxy sidecar needed.
  #
  #  extra_hosts is required on Linux so containers can reach
  #  host.docker.internal, which is used for the Keycloak OIDC issuer URL.
  # ═══════════════════════════════════════════════════════════════════════════
  paperless:
    image: ${PAPERLESS_IMAGE}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PAPERLESS_REDIS:                         redis://paperless-broker:6379
      PAPERLESS_DBHOST:                        paperless-db
      PAPERLESS_TIKA_ENABLED:                  1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT:       http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT:                 http://paperless-tika:9998
      # Public URL used to build OIDC callback URIs — must match registered redirect URIs in Keycloak
      PAPERLESS_URL:                           ${PAPERLESS_PUBLIC_URL}
      PAPERLESS_TIME_ZONE:                     ${TIMEZONE:-Europe/Berlin}
      # OIDC via Keycloak (django-allauth openid_connect)
      # server_url must be the browser-facing Keycloak issuer so the iss claim matches.
      PAPERLESS_APPS:                          allauth.socialaccount.providers.openid_connect
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: >-
        {"openid_connect": {"OAUTH_PKCE_ENABLED": true, "APPS": [{"provider_id": "keycloak",
        "name": "Keycloak", "client_id": "paperless",
        "secret": "${KC_PAPERLESS_CLIENT_SECRET}",
        "settings": {"server_url": "${OIDC_ISSUER}"}}]}}
      # Redirect the login page directly to Keycloak SSO
      PAPERLESS_REDIRECT_LOGIN_TO_SSO:         "false"
      # After logout, terminate the Keycloak SSO session and return to Paperless
      PAPERLESS_LOGOUT_REDIRECT_URL:           "${OIDC_ISSUER}/protocol/openid-connect/logout?client_id=paperless&post_logout_redirect_uri=${PAPERLESS_PUBLIC_URL}"
      # Auto-create a Paperless account for any successfully authenticated Keycloak user.
      # Set to "false" to restrict access to manually pre-created Paperless accounts.
      PAPERLESS_SOCIAL_AUTO_SIGNUP:            "true"
      # Sync Keycloak realm roles → Paperless groups; grant superuser to "admin" role members.
      PAPERLESS_SOCIAL_ACCOUNT_GROUPS_SYNC:    "true"
      PAPERLESS_SOCIAL_ACCOUNT_GROUPS_CLAIM:   "groups"
      PAPERLESS_SOCIAL_ACCOUNT_ADMIN_GROUP:    "admin"
      # Native login is disabled — Keycloak SSO is the only way in.
      # Emergency access via management commands only (docker exec ... createsuperuser).
      PAPERLESS_DISABLE_REGULAR_LOGIN:         "false"
      PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL: ${PAPERLESS_HTTP_PROTOCOL:-http}
      # Bootstrap superuser — created on first start, username/password login disabled.
      PAPERLESS_ADMIN_USER:                    ${PAPERLESS_ADMIN_USER:-paperless-admin}
      PAPERLESS_ADMIN_PASSWORD:                ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_ADMIN_MAIL:                    ${PAPERLESS_ADMIN_MAIL:-admin@localhost}
      # Remote-user auth — allows mcp-paperless to act on behalf of the logged-in user
      # without storing admin credentials. The header value must match the username
      # Paperless assigned during the user's initial OIDC web login.
      PAPERLESS_ENABLE_HTTP_REMOTE_USER:           "true"
      PAPERLESS_ENABLE_HTTP_REMOTE_USER_API:       "true"
      PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME:      "HTTP_X_PAPAIA_REMOTE_USER"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - paperless-db
      - paperless-broker
      - paperless-gotenberg
      - paperless-tika
    ports:
      - "${HOST_IP:-0.0.0.0}:${PAPERLESS_EXT_PORT}:8000"
    volumes:
      - paperless-data:/usr/src/paperless/data
      - ./data/media:/usr/src/paperless/media
      - ./data/export:/usr/src/paperless/export
      - ./data/consume:/usr/src/paperless/consume
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-paperless
      de.fidonis.role: webserver
    profiles: [paperless]

  # ═══════════════════════════════════════════════════════════════════════════
  #  BROKER — Redis message queue
  #
  #  Celery task queue for async document processing and notifications.
  # ═══════════════════════════════════════════════════════════════════════════
  paperless-broker:
    image: ${PAPERLESS_REDIS_IMAGE}
    restart: unless-stopped
    volumes:
      - paperless-redisdata:/data
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-paperless
      de.fidonis.role: broker
    profiles: [paperless]

  # ═══════════════════════════════════════════════════════════════════════════
  #  DATABASE — PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════
  paperless-db:
    image: ${PAPERLESS_DB_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PAPERLESS_DB}
      POSTGRES_USER:     ${PAPERLESS_DBUSER}
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS}
    volumes:
      - paperless-pgdata:/var/lib/postgresql
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-paperless
      de.fidonis.role: database
    profiles: [paperless]

  # ═══════════════════════════════════════════════════════════════════════════
  #  GOTENBERG — Document conversion
  #
  #  Converts .eml and Office documents to PDF for ingestion.
  #  JavaScript disabled; only file:// URLs allowed to prevent SSRF.
  # ═══════════════════════════════════════════════════════════════════════════
  paperless-gotenberg:
    image: ${PAPERLESS_GOTENBERG_IMAGE}
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-paperless
      de.fidonis.role: document-converter
    profiles: [paperless]

  # ═══════════════════════════════════════════════════════════════════════════
  #  TIKA — Text extraction
  #
  #  Extracts text from Office documents, emails, and other formats
  #  that Tesseract cannot handle natively.
  # ═══════════════════════════════════════════════════════════════════════════
  paperless-tika:
    image: ${PAPERLESS_TIKA_IMAGE}
    restart: unless-stopped
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-paperless
      de.fidonis.role: text-extractor
    profiles: [paperless]

volumes:
  paperless-data:
  paperless-pgdata:
  paperless-redisdata:

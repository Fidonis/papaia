- AI & Automation:
    - LibreChat:
        href: http://server:8000
        description: ChatGPT compatible, self-hosted AI chatbot
        icon: librechat.svg
        container: librechat
        showStats: true
    - N8N:
        href: http://server:8400
        description: Self-hosted workflow automation tool with a visual editor and a large library of integrations
        icon: n8n.svg
        container: n8n
        showStats: true
    - LiteLLM:
        href: http://server:8200/ui
        description: Fast, self-hosted LLM inference server
        icon: tsd-proxy.svg
        container: litellm
        showStats: true

- Tools:
    - Paperless-ngx:
        href: http://server:8010
        description: Self-hosted document management system with OCR and a nice UI
        icon: paperless-ngx.svg

        widget:
          type: paperlessngx
          url: http://paperless:8000
          key: your-keyless-key
    - Home Assistant:
        href: http://server:8123
        description: Open-source home automation platform with a powerful dashboard and integrations
        icon: home-assistant.svg
        container: homeassistant
    - SearXNG:
        href: http://server:8500
        description: Self-hosted metasearch engine that aggregates results from multiple search engines while respecting your privacy
        icon: searxng.svg
        container: searxng

- Infrastructure:
    - Keycloak:
        href: http://server:8110/
        description: Indentity and access management solution for modern applications and services, with support for single sign-on, social login, and more
        icon: keycloak.svg
        container: keycloak
    - NGINX Proxy:
        href: http://server:8100/
        description: Self-hosted reverse proxy with a nice UI for managing your services
        icon: nginx-proxy-manager.svg

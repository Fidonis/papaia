services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.11.0
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HP_ALLOWED_HOSTS:-localhost:8300}  # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: ${UID:-1000}  # optional, your user id
      PGID: ${GID:-1000}  # optional, your group id
    ports:
      - ${HOMEPAGE_EXT_PORT:-8300}:3000
    volumes:
      - ./config:/app/config  # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro  # optional, for docker integrations
    networks:
      - default

networks:
  default:
    name: ${DOCKER_NETWORK}
    external: true

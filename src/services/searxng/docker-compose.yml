services:
  searxng:
    image: ${SEARXNG_IMAGE}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    volumes:
      - searxng_config:/etc/searxng
      - searxng_data:/var/cache/searxng
      - type: bind
        source: ${PAPAIA_CONFIG_DIR}/services/searxng/settings.yml
        target: /etc/searxng/settings.yml
    # Port not exposed directly — access only via searxng-auth below
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-searxng
      de.fidonis.role:   search-engine
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: [searxng]

  # oauth2-proxy sidecar — protects SearXNG with Keycloak authentication.
  # Exposed on SEARXNG_EXT_PORT; SearXNG itself is only reachable inside Docker.
  searxng-auth:
    image: ${OAUTH2_PROXY_IMAGE}
    restart: unless-stopped
    command:
      - --provider=oidc
      - --oidc-issuer-url=${OIDC_ISSUER}
      - --skip-oidc-discovery=true
      - --login-url=${OIDC_ISSUER_KC_AUTH}
      - --redeem-url=${OIDC_ISSUER_KC_TOKEN}
      - --oidc-jwks-url=${OIDC_ISSUER_KC_CERTS}
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-secure=${OAUTH2_PROXY_COOKIE_SECURE:-false}
      - --cookie-expire=10h
      - --cookie-refresh=30m
      - --redirect-url=${SEARXNG_PUBLIC_URL}/oauth2/callback
      - --upstream=http://searxng:8080
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --scope=${OIDC_SCOPES}
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=true
      - --pass-user-headers=true
      - --provider-display-name=Keycloak (papAIa)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_IP:-0.0.0.0}:${SEARXNG_EXT_PORT:-8500}:4180"
    depends_on:
      searxng:
        condition: service_healthy
    # No healthcheck: the distroless image has no curl/wget.
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-searxng
      de.fidonis.role:   sso-proxy
    profiles: [searxng]

# Volumes mounted on Windows: \\wsl.localhost\docker-desktop\mnt\docker-desktop-disk\data\docker\volumes
# Volumes mounted on Linux: /var/lib/docker/volumes
volumes:
  searxng_config:
  searxng_data:

# papAIa — LibreChat · AI Chat Interface
# by Fidonis GmbH · https://fidonis.de
# ═══════════════════════════════════════════════════════════════════════════
services:
  librechat:
    image: ${LIBRECHAT_IMAGE}
    restart: unless-stopped
    depends_on:
      librechat-mongodb:
        condition: service_healthy
      litellm:
        condition: service_started
      keycloak:
        condition: service_healthy
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOST: 0.0.0.0
      MONGO_URI: mongodb://librechat-mongodb:27017/LibreChat
      MEILI_HOST: http://librechat-meilisearch:7700
      RAG_PORT: ${RAG_PORT:-8020}
      RAG_API_URL: http://librechat-ragapi:${RAG_PORT:-8020}
    entrypoint: ["/bin/sh", "/app/patches/entrypoint.sh"]
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ${PAPAIA_CONFIG_DIR}/ai/librechat/librechat.yaml
        target: /app/librechat.yaml
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/logs
      # Patch: allows HTTP OIDC issuers (e.g. local Keycloak without TLS).
      # Remove once HTTPS is configured for the identity provider.
      # - type: bind
      #   source: ./patches/openidStrategy.js
      #   target: /app/api/strategies/openidStrategy.js
      # Patch: injects x-librechat-user-email / x-librechat-user-id into MCP requests.
      - type: bind
        source: ./patches/mcp-user-headers.js
        target: /app/patches/mcp-user-headers.js
      # Patch: upserts agents from /app/api/data/agents/ into MongoDB on startup.
      - type: bind
        source: ./patches/agents-init.js
        target: /app/patches/agents-init.js
      # Patch: upserts prompts from /app/api/data/prompts/ into MongoDB on startup.
      - type: bind
        source: ./patches/prompts-init.js
        target: /app/patches/prompts-init.js
      - type: bind
        source: ./patches/entrypoint.sh
        target: /app/patches/entrypoint.sh
      # Optional: provision pre-defined agents from an external directory.
      # Set LIBRECHAT_AGENTS_DIR in .env to a host path containing one
      # *.yaml per agent. Default points to an empty stub so dev/stage
      # behave exactly as before.
      - type: bind
        source: ${LIBRECHAT_AGENTS_DIR:-./agents-stub}
        target: /app/api/data/agents
        read_only: true
      # Optional: provision pre-defined prompts from an external directory.
      # Set LIBRECHAT_PROMPTS_DIR in .env to a host path containing one
      # *.md per prompt (YAML front matter + markdown body). Default
      # points to an empty stub so dev/stage behave exactly as before.
      - type: bind
        source: ${LIBRECHAT_PROMPTS_DIR:-./prompts-stub}
        target: /app/api/data/prompts
        read_only: true
      # - ./librechat/logo.svg:/app/client/dist/assets/logo.svg
      # - ./librechat/favicon-32x32.png:/app/client/dist/assets/favicon-32x32.png
      # - ./librechat/favicon-16x16.png:/app/client/dist/assets/favicon-16x16.png
    ports:
      - "${HOST_IP:-0.0.0.0}:${LIBRECHAT_EXT_PORT}:3080"
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-librechat
      de.fidonis.role:   chat-interface
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: [librechat]

  librechat-mongodb:
    restart: unless-stopped
    image: ${LIBRECHAT_MONGODB_IMAGE}
    volumes:
      - librechat-mongodb:/data/db
    command: mongod --noauth
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-librechat
      de.fidonis.role:   database
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles: [librechat]

  librechat-meilisearch:
    image: ${LIBRECHAT_MEILISEARCH_IMAGE}
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: true
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - librechat-meilisearch:/meili_data
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-librechat
      de.fidonis.role:   search
    profiles: [librechat]

  librechat-vectordb:
    image: ${LIBRECHAT_VECTORDB_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VECTORDB_NAME}
      POSTGRES_USER: ${VECTORDB_USER}
      POSTGRES_PASSWORD: ${VECTORDB_PASSWORD}
    volumes:
      - librechat-vectordb:/var/lib/postgresql/data
    # Port not exposed — internal use only by ragapi
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-librechat
      de.fidonis.role:   vector-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${VECTORDB_NAME} -U ${VECTORDB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [librechat]

  librechat-ragapi:
    image: ${LIBRECHAT_RAGAPI_IMAGE}
    restart: unless-stopped
    environment:
      DB_HOST: librechat-vectordb
      RAG_PORT: ${RAG_PORT:-8020}
      POSTGRES_DB: ${VECTORDB_NAME}
      POSTGRES_USER: ${VECTORDB_USER}
      POSTGRES_PASSWORD: ${VECTORDB_PASSWORD}
    depends_on:
      librechat-vectordb:
        condition: service_healthy
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-librechat
      de.fidonis.role:   rag-api
    profiles: [librechat]

# Volumes mounted on Windows: \\wsl.localhost\docker-desktop\mnt\docker-desktop-disk\data\docker\volumes
# Volumes mounted on Linux: /var/lib/docker/volumes
volumes:
  librechat-images:
  librechat-uploads:
  librechat-logs:
  librechat-mongodb:
  librechat-meilisearch:
  librechat-vectordb:

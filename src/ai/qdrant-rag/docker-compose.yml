# ═══════════════════════════════════════════════════════════════════════════
# papAIa — qdrant-rag · OIDC + RBAC layer over Qdrant
# by Fidonis GmbH · https://fidonis.de
# ═══════════════════════════════════════════════════════════════════════════
#
#  FastMCP server exposing Qdrant via streamable-HTTP with OIDC
#  authentication and role-based access control. Validates the caller's
#  Bearer token against Keycloak and derives per-user Qdrant access
#  from the ACL collection.
#
#  LibreChat forwards the logged-in user's Keycloak access token via
#  the native {{LIBRECHAT_OPENID_ACCESS_TOKEN}} header placeholder.
#
#  Requires:
#    - OIDC_ISSUER in root .env (reused, no duplicate)
#    - QDRANT_RAG_* variables in root .env
# ═══════════════════════════════════════════════════════════════════════════
services:
  qdrant-rag:
    image: ${QDRANT_RAG_IMAGE}
    restart: unless-stopped
    environment:
      # OIDC / Keycloak
      OIDC_ISSUER_URL:          ${OIDC_ISSUER}
      OIDC_AUDIENCE:            ${QDRANT_RAG_OIDC_AUDIENCE:-qdrant-rag}
      OIDC_JWKS_CACHE_TTL:      ${QDRANT_RAG_OIDC_JWKS_CACHE_TTL:-3600}
      # Qdrant
      QDRANT_URL:               ${QDRANT_RAG_QDRANT_URL:-http://docrag-vectordb:6333}
      QDRANT_JWT_SECRET:        ${QDRANT_RAG_QDRANT_JWT_SECRET}
      QDRANT_JWT_TTL:           ${QDRANT_RAG_QDRANT_JWT_TTL:-3600}
      # MCP server — defaults match the container port mapping below.
      # Changing MCP_PORT requires updating the ports mapping accordingly.
      MCP_HOST:                 ${QDRANT_RAG_MCP_HOST:-0.0.0.0}
      MCP_PORT:                 ${QDRANT_RAG_MCP_PORT:-8000}
      MCP_PATH:                 ${QDRANT_RAG_MCP_PATH:-/mcp}
      # Logging
      LOG_LEVEL:                ${QDRANT_RAG_LOG_LEVEL:-INFO}
      # Embeddings
      EMBEDDING_API_URL:        ${QDRANT_RAG_EMBEDDING_API_URL:-http://litellm:4000/v1}
      EMBEDDING_API_KEY:        ${QDRANT_RAG_EMBEDDING_API_KEY:-}
      EMBEDDING_META_COLLECTION: ${QDRANT_RAG_EMBEDDING_META_COLLECTION:-_collection_meta}
      # RBAC
      RBAC_ADMIN_ROLE:          ${QDRANT_RAG_RBAC_ADMIN_ROLE:-qdrant-admin}
      RBAC_ACL_COLLECTION:      ${QDRANT_RAG_RBAC_ACL_COLLECTION:-_rbac_acl}
      RBAC_ACL_CACHE_TTL:       ${QDRANT_RAG_RBAC_ACL_CACHE_TTL:-60}
      RBAC_SERVICE_TOKEN_TTL:   ${QDRANT_RAG_RBAC_SERVICE_TOKEN_TTL:-300}
    ports:
      - "${HOST_IP:-0.0.0.0}:${QDRANT_RAG_EXT_PORT:-8800}:8000"
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-qdrant-rag
      de.fidonis.role:   mcp-server
    profiles: [qdrant-rag]

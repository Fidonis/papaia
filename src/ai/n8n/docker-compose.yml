# ═══════════════════════════════════════════════════════════════════════════
# papAIa — n8n · Workflow Automation
# by Fidonis GmbH · https://fidonis.de
# ═══════════════════════════════════════════════════════════════════════════
services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  N8N — Workflow engine
  #
  #  Not exposed directly — all access goes through n8n-auth (oauth2-proxy).
  # ═══════════════════════════════════════════════════════════════════════════
  n8n:
    image: ${N8N_IMAGE}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_TYPE:                  postgresdb
      DB_POSTGRESDB_HOST:       n8n-db
      DB_POSTGRESDB_PORT:       5432
      DB_POSTGRESDB_DATABASE:   ${N8N_DB:-n8n}
      DB_POSTGRESDB_USER:       ${N8N_DBUSER:-n8n}
      DB_POSTGRESDB_PASSWORD:   ${N8N_DBPASS}
      N8N_RUNNERS_MODE:         internal
      N8N_SECURE_COOKIE:        "false"
    depends_on:
      n8n-db:
        condition: service_healthy
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - papaia-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=3 http://localhost:5678/healthz 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      de.fidonis.module: papaia-n8n
      de.fidonis.role:   workflow-engine
    profiles: [n8n]

  # ═══════════════════════════════════════════════════════════════════════════
  #  N8N-PROXY — nginx shim
  #
  #  Sits between oauth2-proxy and n8n. Intercepts n8n's post-logout redirect
  #  to /signin and turns it into /oauth2/sign_out so the proxy session cookie
  #  is cleared and the user must re-authenticate via Keycloak.
  # ═══════════════════════════════════════════════════════════════════════════
  n8n-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${PAPAIA_CONFIG_DIR}/ai/n8n/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-n8n
      de.fidonis.role:   logout-shim
    profiles: [n8n]

  # ═══════════════════════════════════════════════════════════════════════════
  #  N8N-AUTH — oauth2-proxy (Keycloak SSO gate)
  #
  #  The only publicly exposed endpoint for n8n. Enforces Keycloak login
  #  before proxying to the n8n service. Uses the shared oauth2-proxy client
  #  and the split-URL approach (browser vs. internal Docker endpoints).
  # ═══════════════════════════════════════════════════════════════════════════
  n8n-auth:
    image: ${OAUTH2_PROXY_IMAGE}
    restart: unless-stopped
    command:
      - --provider=oidc
      - --oidc-issuer-url=${OIDC_ISSUER}
      - --skip-oidc-discovery=true
      - --login-url=${OIDC_ISSUER_KC_AUTH}
      - --redeem-url=${OIDC_ISSUER_KC_TOKEN}
      - --oidc-jwks-url=${OIDC_ISSUER_KC_CERTS}
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-secure=${OAUTH2_PROXY_COOKIE_SECURE:-false}
      - --redirect-url=${N8N_PUBLIC_URL}/oauth2/callback
      - --upstream=http://n8n-proxy:5679
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --scope=${OIDC_SCOPES}
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=true
      - --pass-user-headers=true
      - --provider-display-name=Keycloak (papAIa)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_IP:-0.0.0.0}:${N8N_EXT_PORT}:4180"
    depends_on:
      n8n-proxy:
        condition: service_started
    # No healthcheck: the distroless image has no curl/wget.
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-n8n
      de.fidonis.role:   sso-proxy
    profiles: [n8n]
    
  # ═══════════════════════════════════════════════════════════════════════════
  #  N8N-DB — PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════
  n8n-db:
    image: ${N8N_POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${N8N_DB:-n8n}
      POSTGRES_USER:     ${N8N_DBUSER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DBPASS}
    volumes:
      - n8n-pgdata:/var/lib/postgresql/data
    networks:
      - papaia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${N8N_DB:-n8n} -U ${N8N_DBUSER:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      de.fidonis.module: papaia-n8n
      de.fidonis.role:   database
    profiles: [n8n]
    
volumes:
  n8n-data:
  n8n-pgdata:

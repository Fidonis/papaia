server {
    listen 5679;

    # n8n redirects to /signin after logout.
    # Intercept and redirect to oauth2-proxy's sign_out, which clears
    # the proxy session cookie and triggers a fresh Keycloak login.
    location = /signin {
        return 302 /oauth2/sign_out?rd=%2F;
    }

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
    }
}

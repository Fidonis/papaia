# ═══════════════════════════════════════════════════════════════════════════
# papAIa — Technitium · DNS Server
# by Fidonis GmbH · https://fidonis.de
# ═══════════════════════════════════════════════════════════════════════════
services:
  technitium:
    hostname: ${DNS_SERVER_HOSTNAME}
    image: ${TECHNITIUM_IMAGE}
    environment:
      - DNS_SERVER_DOMAIN=${DNS_SERVER_DOMAIN}
      - DNS_SERVER_ADMIN_PASSWORD=${DNS_SERVER_ADMIN_PASSWORD}
      # - DNS_SERVER_ADMIN_PASSWORD_FILE=${DNS_SERVER_ADMIN_PASSWORD_FILE}
      # - DNS_SERVER_PREFER_IPV6=${DNS_SERVER_PREFER_IPV6}
      # - DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES=${DNS_SERVER_WEB_SERVICE_LOCAL_ADDRESSES}
      # - DNS_SERVER_WEB_SERVICE_HTTP_PORT=${DNS_SERVER_WEB_SERVICE_HTTP_PORT}
      # - DNS_SERVER_WEB_SERVICE_HTTPS_PORT=${DNS_SERVER_WEB_SERVICE_HTTPS_PORT}
      # - DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS=${DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS}
      # - DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT=${DNS_SERVER_WEB_SERVICE_USE_SELF_SIGNED_CERT}
      # - DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PATH=${DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PATH}
      # - DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PASSWORD=${DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PASSWORD}
      # - DNS_SERVER_WEB_SERVICE_HTTP_TO_TLS_REDIRECT=${DNS_SERVER_WEB_SERVICE_HTTP_TO_TLS_REDIRECT}
      # - DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP=${DNS_SERVER_OPTIONAL_PROTOCOL_DNS_OVER_HTTP}
      # - DNS_SERVER_RECURSION=${DNS_SERVER_RECURSION}
      # - DNS_SERVER_RECURSION_NETWORK_ACL=${DNS_SERVER_RECURSION_NETWORK_ACL}
      # - DNS_SERVER_ENABLE_BLOCKING=${DNS_SERVER_ENABLE_BLOCKING}
      # - DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT=${DNS_SERVER_ALLOW_TXT_BLOCKING_REPORT}
      # - DNS_SERVER_BLOCK_LIST_URLS=${DNS_SERVER_BLOCK_LIST_URLS}
      # - DNS_SERVER_FORWARDERS=${DNS_SERVER_FORWARDERS}
      # - DNS_SERVER_FORWARDER_PROTOCOL=${DNS_SERVER_FORWARDER_PROTOCOL}
      # - DNS_SERVER_LOG_USING_LOCAL_TIME=${DNS_SERVER_LOG_USING_LOCAL_TIME}
    volumes:
      - technitium-config:/etc/dns
    restart: unless-stopped
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
    # For DHCP deployments, use "host" network mode and remove all the port mappings, including the ports array by commenting them
    # network_mode: "host"
    ports:
      # Admin UI port NOT exposed directly — access only via technitium-auth below
      - "53:53/udp"         #DNS service
      - "53:53/tcp"         #DNS service
      # - "853:853/udp"     #DNS-over-QUIC service
      # - "853:853/tcp"     #DNS-over-TLS service
      # - "443:443/udp"     #DNS-over-HTTPS service (HTTP/3)
      # - "443:443/tcp"     #DNS-over-HTTPS service (HTTP/1.1, HTTP/2)
      # - "80:80/tcp"       #DNS-over-HTTP service (use with reverse proxy or certbot certificate renewal)
      # - "8053:8053/tcp"   #DNS-over-HTTP service (use with reverse proxy)
      # - "67:67/udp"       #DHCP service
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-technitium
      de.fidonis.role:   dns-server
    healthcheck:
      test: ["CMD", "dig", "+short", "+norecurse", "+retry=0", "@127.0.0.1", "fidonis.de"]
      interval: ${TECHNITIUM_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${TECHNITIUM_HEALTHCHECK_TIMEOUT:-10s}
      retries: ${TECHNITIUM_HEALTHCHECK_RETRIES:-3}
      start_period: ${TECHNITIUM_HEALTHCHECK_START_PERIOD:-40s}
    profiles: [technitium]

  # oauth2-proxy sidecar — protects the Technitium admin UI with Keycloak authentication.
  # Exposed on TECHNITIUM_EXT_PORT; Technitium admin (port 5380) is only reachable inside Docker.
  technitium-auth:
    image: ${OAUTH2_PROXY_IMAGE}
    restart: unless-stopped
    ports:
      - "${HOST_IP:-0.0.0.0}:${TECHNITIUM_EXT_PORT:-8120}:4180"
    command:
      - --provider=oidc
      - --oidc-issuer-url=${OIDC_ISSUER}
      - --skip-oidc-discovery=true
      - --login-url=${OIDC_ISSUER_KC_AUTH}
      - --redeem-url=${OIDC_ISSUER_KC_TOKEN}
      - --oidc-jwks-url=${OIDC_ISSUER_KC_CERTS}
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-secure=${OAUTH2_PROXY_COOKIE_SECURE:-false}
      - --cookie-expire=10h
      - --cookie-refresh=30m
      - --redirect-url=${PAPAIA_HOST}:${TECHNITIUM_EXT_PORT:-8120}/oauth2/callback
      - --upstream=http://technitium:5380
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --scope=${OIDC_SCOPES}
      - --oidc-groups-claim=roles
      - --allowed-group=admin
      - --whitelist-domain=host.docker.internal:8110
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=true
      - --pass-user-headers=true
      - --provider-display-name=Keycloak (papAIa)
    depends_on:
      technitium:
        condition: service_healthy
    # No healthcheck: the distroless image has no curl/wget.
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-technitium
      de.fidonis.role:   sso-proxy
    profiles: [technitium]
    
volumes:
  technitium-config:

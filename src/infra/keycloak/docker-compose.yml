services:
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    restart: unless-stopped
    ports:
      - "${HOST_IP:-0.0.0.0}:${KEYCLOAK_EXT_PORT}:8080"
    volumes:
      - type: bind
        source: ${PAPAIA_CONFIG_DIR}/infra/keycloak/keycloak.conf
        target: /opt/keycloak/conf/keycloak.conf
      - type: bind
        source: ${PAPAIA_CONFIG_DIR}/infra/keycloak/realm-import
        target: /opt/keycloak/data/import
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_SCHEMA: public
      KC_DB_URL: jdbc:postgresql://keycloak-postgres/keycloak
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      # Trust X-Forwarded-* headers from the edge proxy. Without this Keycloak
      # treats the request as plain HTTP and drops cookies "Secure" → cross-
      # origin OIDC POSTs lose state and login fails. Set KC_PROXY_HEADERS
      # to empty if you ever expose Keycloak directly without a reverse proxy.
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS}
      # Client secrets — injected into realm JSON via ${env.VAR} substitution at import time
      KC_OAUTH2_PROXY_CLIENT_SECRET: ${KC_OAUTH2_PROXY_CLIENT_SECRET}
      KC_LIBRECHAT_CLIENT_SECRET: ${KC_LIBRECHAT_CLIENT_SECRET}
      KC_PAPERLESS_CLIENT_SECRET: ${KC_PAPERLESS_CLIENT_SECRET}
      KC_LITELLM_CLIENT_SECRET: ${KC_LITELLM_CLIENT_SECRET}
    # --import-realm: imports realm-import/*.json on first start (skipped if realm exists)
    command: start --import-realm
    networks:
      - papaia-net
    labels:
      de.fidonis.module: papaia-keycloak
      de.fidonis.role:   identity-provider
    healthcheck:
      test: ["CMD-SHELL", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    profiles: [keycloak]

  keycloak-postgres:
    image: ${KEYCLOAK_POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak-postgresql:/var/lib/postgresql
    networks:
      - papaia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d keycloak -U ${KC_DB_USER}"]
      interval: 1s
      timeout: 5s
      retries: 10
    labels:
      de.fidonis.module: papaia-keycloak
      de.fidonis.role:   database
    profiles: [keycloak]

# Volumes mounted on Windows: \\wsl.localhost\docker-desktop\mnt\docker-desktop-disk\data\docker\volumes
# Volumes mounted on Linux: /var/lib/docker/volumes
volumes:
  keycloak-postgresql:

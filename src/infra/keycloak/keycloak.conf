# Expose /health/ready on the management port (9000) — used by the
# Docker healthcheck and bootstrap.sh (via docker exec, not host port).
health-enabled=true
http-management-health-enabled=true

# Allow HTTP — required for local/internal deployments without TLS.
# For production, remove this and terminate TLS at the reverse proxy.
http-enabled=true

# Accept requests regardless of the Host header value.
# Needed because KC_HOSTNAME uses host.docker.internal / IP but requests
# may arrive via different hostnames (e.g. localhost, reverse proxy).
hostname-strict=false
